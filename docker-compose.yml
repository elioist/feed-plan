services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feed_plan
    ports:
      # 宿主 9529 -> 容器 5432，统一项目端口从 9527 起编排
      - '9529:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 9527
      # 容器内通过服务名 db 访问 postgres
      DATABASE_URL: postgres://postgres:postgres@db:5432/feed_plan
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
    ports:
      - '9527:9527'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
