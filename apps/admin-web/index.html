<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed Plan Admin</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #f5f7fb;
      }

      .app-bootstrap-loading {
        --app-loading-primary: #60c041;
        --app-loading-accent: #f28b72;

        position: relative;
        display: grid;
        min-height: 100dvh;
        place-items: center;
        color: #151923;
        background: #f5f7fb;
      }

      .app-bootstrap-loading__stage {
        position: relative;
        display: grid;
        min-width: 172px;
        min-height: 128px;
        padding: 18px 22px 28px;
        overflow: hidden;
        place-items: center;
      }

      .app-bootstrap-loading__loader {
        position: relative;
        width: 48px;
        height: 48px;
        margin-bottom: 28px;
      }

      .app-bootstrap-loading__loader::before {
        position: absolute;
        top: 60px;
        left: 0;
        width: 48px;
        height: 5px;
        content: '';
        background: rgb(96 192 65 / 0.5);
        border-radius: 50%;
        animation: app-bootstrap-loading-shadow 0.5s linear infinite;
      }

      .app-bootstrap-loading__loader::after {
        position: absolute;
        inset: 0;
        content: '';
        background:
          linear-gradient(135deg, rgb(255 255 255 / 0.28), transparent 42%),
          var(--app-loading-primary);
        border-radius: 6px;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 0.28),
          0 14px 30px rgb(96 192 65 / 0.22);
        animation: app-bootstrap-loading-jump 0.5s linear infinite;
      }

      .app-bootstrap-loading__label {
        color: #6b7890;
        font: 13px/1 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .app-bootstrap-loading__progress {
        position: absolute;
        right: 22px;
        bottom: 8px;
        left: 22px;
        height: 2px;
        overflow: hidden;
        background: rgb(232 237 245 / 0.72);
        border-radius: 999px;
      }

      .app-bootstrap-loading__progress::after {
        position: absolute;
        inset: 0;
        width: 38%;
        content: '';
        background: linear-gradient(90deg, var(--app-loading-primary), color-mix(in srgb, var(--app-loading-primary) 58%, var(--app-loading-accent)));
        border-radius: inherit;
        animation: app-bootstrap-loading-progress 1s linear infinite;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0f1117;
        }

        .app-bootstrap-loading {
          color: #f3f5f9;
          background: #0f1117;
        }

        .app-bootstrap-loading__label {
          color: #98a3b8;
        }

        .app-bootstrap-loading__progress {
          background: rgb(48 54 70 / 0.72);
        }
      }

      @keyframes app-bootstrap-loading-jump {
        15% {
          border-bottom-right-radius: 3px;
        }

        25% {
          transform: translateY(9px) rotate(22.5deg);
        }

        50% {
          border-bottom-right-radius: 40px;
          transform: translateY(18px) scale(1, 0.9) rotate(45deg);
        }

        75% {
          transform: translateY(9px) rotate(67.5deg);
        }

        100% {
          transform: translateY(0) rotate(90deg);
        }
      }

      @keyframes app-bootstrap-loading-shadow {
        0%,
        100% {
          transform: scale(1, 1);
        }

        50% {
          transform: scale(1.2, 1);
        }
      }

      @keyframes app-bootstrap-loading-progress {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(280%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-bootstrap-loading__loader::before,
        .app-bootstrap-loading__loader::after,
        .app-bootstrap-loading__progress::after {
          animation-duration: 1ms;
          animation-iteration-count: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-bootstrap-loading">
        <div class="app-bootstrap-loading__stage">
          <div class="app-bootstrap-loading__loader" role="status" aria-label="页面加载中"></div>
          <div class="app-bootstrap-loading__label">马上就好，正在加载中</div>
          <span class="app-bootstrap-loading__progress" aria-hidden="true"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
